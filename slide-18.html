<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Week 3 — 아트와 사운드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:720pt;height:405pt;background:#0F0F0F;color:#FFFFFF;font-family:'Pretendard',-apple-system,sans-serif;overflow:hidden;position:relative}

  .col-name{font-size:30pt;font-weight:700;color:#FFFFFF;line-height:1.2;letter-spacing:-0.025em;}

</head>
<body>
  <p class="mono" style="position:absolute;top:32pt;left:48pt;font-size:9pt;color:#707070;">WEEK 03 · 02 / 03 · TOOLS</p>
  <p class="mono" style="font-size:9pt;color:#707070;position:absolute;top:32pt;right:48pt;">P. 18</p>

  <h1 style="position:absolute;top:64pt;left:48pt;right:48pt;font-size:30pt;font-weight:700;color:#FFFFFF;line-height:1.3;letter-spacing:-0.02em;">
    아트는 GPT·Gemini.<br><span style="color:#B0B0B0;">BGM은 Suno.</span>
  </h1>

  <div style="position:absolute;left:48pt;right:48pt;bottom:60pt;height:120pt;display:flex;">
    <div class="col">
      <p class="col-mono">ART</p>
      <p class="col-name">GPT</p>
    </div>
    <div class="col">
      <p class="col-mono">ART</p>
      <p class="col-name">Gemini</p>
    </div>
    <div class="col">
      <p class="col-mono">SOUND</p>
      <p class="col-name">Suno</p>
    </div>
  </div>

  <p class="mono" style="position:absolute;bottom:24pt;left:48pt;font-size:8pt;color:#707070;">"곡 왤케 잘 뽑음...?" · ComfyUI는 여전히 갈증</p>
</body>
</html>
