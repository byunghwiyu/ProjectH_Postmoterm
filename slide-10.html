<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Week 1 — 티케팅 프로세스</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300..700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:720pt;height:405pt;background:#0F0F0F;color:#FFFFFF;font-family:'Pretendard',-apple-system,sans-serif;overflow:hidden;position:relative}
  .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0.18em;text-transform:uppercase}
  .panel-frame{background:#1A1A1A;border:1pt solid #333;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .panel-frame img{width:100%;height:100%;object-fit:contain;display:block;}
</style>
</head>
<body>
  <p class="mono" style="position:absolute;top:32pt;left:48pt;font-size:9pt;color:#707070;">WEEK 01 · 04 / 08 · TICKETING</p>
  <p class="mono" style="font-size:9pt;color:#707070;position:absolute;top:32pt;right:48pt;">P. 10</p>

  <h1 style="position:absolute;top:64pt;left:48pt;right:48pt;font-size:26pt;font-weight:700;color:#FFFFFF;line-height:1.3;letter-spacing:-0.02em;">
    GPT 티켓 → Codex 결과물. <span style="color:#B0B0B0;">검증·해결까지 한 번에.</span>
  </h1>

  <div style="position:absolute;left:48pt;right:48pt;top:140pt;display:flex;gap:14pt;justify-content:center;">
    <div class="panel-frame" style="width:260pt;height:200pt;">
      <img src="./assets/1-2-1.jpg" alt="">
    </div>
    <div class="panel-frame" style="width:260pt;height:200pt;">
      <img src="./assets/1-4-1.jpg" alt="">
    </div>
  </div>

  <div style="position:absolute;left:48pt;right:48pt;top:354pt;display:flex;gap:14pt;justify-content:center;">
    <div style="width:260pt;">
      <p class="mono" style="font-size:8pt;color:#707070;margin-bottom:4pt;">FIG. 03</p>
      <p style="font-size:10pt;color:#B0B0B0;line-height:1.4;">로그인·캐릭터 선택·인벤토리</p>
    </div>
    <div style="width:260pt;">
      <p class="mono" style="font-size:8pt;color:#FFFFFF;margin-bottom:4pt;">FIG. 04</p>
      <p style="font-size:10pt;color:#FFFFFF;line-height:1.4;">"검증해서 문제까지 해결해서 가져온다고?!"</p>
    </div>
  </div>
</body>
</html>
